<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>LLM VRAM Calculator</title>
	<style>
		:root {
			--primary: #2563eb;
			--primary-hover: #1d4ed8;
			--on-primary: #ffffff;
			--background: #f8fafc;
			--surface: #ffffff;
			--text: #0f172a;
			--text-muted: #64748b;
			--border: #e2e8f0;
			--input-bg: #f1f5f9;
			--success: #16a34a;
			--danger: #dc2626;
			--warning: #ea580c;
			--warning-bg: #ffedd5;
			--warning-text: #9a3412;
			--radius: 0.75rem;
		}

		@media (prefers-color-scheme: dark) {
			:root:not(.light) {
				--primary: #3b82f6;
				--primary-hover: #60a5fa;
				--on-primary: #ffffff;
				--background: #0f172a;
				--surface: #1e293b;
				--text: #f1f5f9;
				--text-muted: #94a3b8;
				--border: #334155;
				--input-bg: #0f172a;
				--success: #4ade80;
				--danger: #f87171;
				--warning: #fb923c;
				--warning-bg: #431407;
				--warning-text: #ffedd5;
			}
		}

		:root.dark {
			--primary: #3b82f6;
			--primary-hover: #60a5fa;
			--on-primary: #ffffff;
			--background: #0f172a;
			--surface: #1e293b;
			--text: #f1f5f9;
			--text-muted: #94a3b8;
			--border: #334155;
			--input-bg: #0f172a;
			--success: #4ade80;
			--danger: #f87171;
			--warning: #fb923c;
			--warning-bg: #431407;
			--warning-text: #ffedd5;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background: var(--background);
			color: var(--text);
			font-family: sans-serif;
			line-height: 1.5;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 2rem;
		}

		.container {
			width: 100%;
			max-width: 1200px;
			margin: 0 auto;
		}

		/* Header */
		.app-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 2rem;
			flex-wrap: wrap;
			gap: 1rem;
		}

		.title-group h1 {
			font-size: 1.875rem;
			font-weight: 800;
			color: var(--primary);
			letter-spacing: -0.025em;
		}

		.subtitle {
			color: var(--text-muted);
			font-size: 0.95rem;
			max-width: 600px;
		}

		.selectors {
			display: flex;
			gap: 0.75rem;
		}

		select {
			background: var(--surface);
			border: 1px solid var(--border);
			color: var(--text);
			padding: 0.5rem 2rem 0.5rem 1rem;
			border-radius: 0.5rem;
			font-size: 0.875rem;
			cursor: pointer;
			appearance: none;
			background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
			background-position: right 0.5rem center;
			background-repeat: no-repeat;
			background-size: 1.5em 1.5em;
		}

		select:focus {
			outline: 2px solid var(--primary);
			outline-offset: 1px;
			border-color: var(--primary);
		}

		/* Main Grid */
		.main-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 2rem;
			margin-bottom: 2rem;
		}

		.card {
			background: var(--surface);
			border-radius: var(--radius);
			border: 1px solid var(--border);
			padding: 1.5rem;
			margin-bottom: 1.5rem;
		}

		.card:last-child {
			margin-bottom: 0;
		}

		.card h2 {
			font-size: 1.125rem;
			font-weight: 700;
			margin-bottom: 1.25rem;
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}

		.form-group {
			margin-bottom: 1.5rem;
		}

		.form-group:last-child {
			margin-bottom: 0;
		}

		.label-row {
			display: flex;
			justify-content: space-between;
			margin-bottom: 0.5rem;
		}

		.label-row label {
			font-weight: 600;
			font-size: 0.9rem;
			color: var(--text);
		}

		.label-row .value {
			font-family: monospace;
			font-weight: 700;
			color: var(--primary);
		}

		/* Inputs */
		input[type="range"] {
			width: 100%;
			height: 6px;
			background: var(--border);
			border-radius: 3px;
			outline: none;
			-webkit-appearance: none;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 18px;
			height: 18px;
			background: var(--primary);
			border-radius: 50%;
			cursor: pointer;
			transition: transform 0.1s;
		}

		input[type="range"]::-webkit-slider-thumb:hover {
			transform: scale(1.1);
		}

		.slider-labels {
			position: relative;
			height: 1rem;
			font-size: 0.75rem;
			color: var(--text-muted);
			margin-top: 0.5rem;
		}

		.slider-labels span {
			position: absolute;
			transform: translateX(-50%);
			white-space: nowrap;
		}

		.slider-labels span:first-child {
			left: 0 !important;
			transform: none;
		}

		.slider-labels span:last-child {
			left: auto !important;
			right: 0;
			transform: none;
		}

		select.full-width {
			width: 100%;
		}

		/* Results */
		.result-card {
			background: var(--surface);
			border-radius: var(--radius);
			border: 1px solid var(--border);
			padding: 2rem;
			text-align: center;
			margin-bottom: 1.5rem;
			position: sticky;
			top: 1rem;
			z-index: 10;
		}

		.result-value {
			font-size: 4rem;
			font-weight: 800;
			line-height: 1;
			color: var(--primary);
			margin: 0.5rem 0;
			letter-spacing: -0.05em;
			transition: color 0.3s ease, font-size 0.3s ease;
		}

		.result-value.insufficient {
			font-size: 2.5rem;
			color: var(--danger);
		}

		.result-value.toy { color: var(--text-muted); }
		.result-value.small { color: var(--success); }
		.result-value.medium { color: var(--primary); }
		.result-value.large { color: var(--warning); }
		.result-value.very-large { color: var(--danger); }
		.result-value.massive { color: var(--danger); }

		.result-category {
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			font-size: 0.75rem;
			letter-spacing: 0.05em;
		}

		.model-details {
			margin-top: 1.5rem;
			padding-top: 1rem;
			border-top: 1px solid var(--border);
			display: flex;
			justify-content: center;
			gap: 2rem;
		}

		.detail-item {
			display: flex;
			flex-direction: column;
		}

		.detail-item span:first-child {
			font-size: 0.75rem;
			color: var(--text-muted);
		}

		.detail-item span:last-child {
			font-weight: 700;
			font-size: 1.125rem;
		}

		/* Metrics */
		.metric-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0.75rem 0;
			border-bottom: 1px solid var(--border);
		}

		.metric-row:last-child {
			border-bottom: none;
		}

		/* Memory Bar */
		.memory-bar-container {
			display: flex;
			height: 12px;
			background: var(--input-bg);
			border-radius: 6px;
			overflow: hidden;
			margin-bottom: 1.5rem;
			border: 1px solid var(--border);
		}

		.memory-bar-segment {
			height: 100%;
			transition: width 0.3s ease;
		}

		.segment-overhead { background: var(--danger); }
		.segment-kv { background: var(--warning); }
		.segment-model { background: var(--primary); }

		.metric-label {
			font-size: 0.9rem;
			color: var(--text-muted);
		}

		.metric-value-group {
			text-align: right;
		}

		.metric-val {
			font-weight: 700;
			font-family: monospace;
		}

		.metric-sub {
			font-size: 0.75rem;
			color: var(--text-muted);
			display: block;
		}

		/* Warning */
		.warning-box {
			background: var(--warning-bg);
			border: 1px solid var(--warning);
			color: var(--warning-text);
			padding: 1rem;
			border-radius: var(--radius);
			margin-bottom: 1.5rem;
			font-size: 0.9rem;
		}

		.warning-box p {
			margin-bottom: 0.25rem;
		}

		/* Presets */
		.presets-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
			gap: 0.75rem;
		}

		.preset-btn {
			background: var(--surface);
			border: 1px solid var(--border);
			padding: 0.75rem;
			border-radius: 0.5rem;
			color: var(--text);
			font-weight: 500;
			font-size: 0.875rem;
			cursor: pointer;
			transition: all 0.2s;
		}

		.preset-btn:hover {
			border-color: var(--primary);
			color: var(--primary);
			transform: translateY(-1px);
		}

		/* Reference */
		.reference-section {
			margin-top: 3rem;
			padding-top: 2rem;
			border-top: 1px solid var(--border);
			color: var(--text-muted);
			font-size: 0.875rem;
		}

		.reference-section h3 {
			color: var(--text);
			margin-bottom: 1rem;
		}

		.reference-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 2rem;
		}

		.hidden {
			display: none !important;
		}

		/* Mobile Optimizations */
		@media (max-width: 1024px) {
			.main-grid {
				grid-template-columns: 1fr;
				gap: 1rem;
			}
			.result-card {
				position: static;
			}
		}

		@media (max-width: 600px) {
			body {
				padding: 0;
				background: var(--surface);
			}

			.container {
				padding: 1rem;
			}

			.app-header {
				flex-direction: column;
				align-items: flex-start;
				margin-bottom: 1.5rem;
			}

			.selectors {
				width: 100%;
			}

			.selectors select {
				flex: 1;
			}

			.main-grid {
				display: flex;
				flex-direction: column;
			}

			.card {
				border: none;
				padding: 0;
				margin-bottom: 2rem;
				border-bottom: 1px solid var(--border);
				border-radius: 0;
				padding-bottom: 1.5rem;
			}

			.card:last-child {
				border-bottom: none;
			}

			.result-card {
				border: 1px solid var(--border);
				background: var(--input-bg);
				margin-bottom: 2rem;
			}

			.result-value {
				font-size: 3rem;
			}

			input[type="range"] {
				height: 8px; /* Larger touch target */
			}

			input[type="range"]::-webkit-slider-thumb {
				width: 24px;
				height: 24px;
			}

			.reference-grid {
				grid-template-columns: 1fr;
				gap: 1rem;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<header class="app-header">
			<div class="title-group">
				<h1 id="title">LLM VRAM Calculator</h1>
				<p id="subtitle" class="subtitle">Calculate maximum model size based on your hardware.</p>
			</div>
			<div class="selectors">
				<select id="language">
					<option value="en">English</option>
					<option value="id">Bahasa Indonesia</option>
				</select>
				<select id="theme">
					<option value="auto">Auto</option>
					<option value="light">Light</option>
					<option value="dark">Dark</option>
				</select>
			</div>
		</header>
		
		<div class="main-grid">
			<!-- Controls Column -->
			<div class="controls-column">
				<div class="card">
					<h2 id="vramLabel">GPU Memory</h2>
					<div class="form-group">
						<div class="label-row">
							<label id="vramSizeLabel">VRAM Size</label>
							<span class="value" id="vramValue">24 GB</span>
						</div>
						<input type="range" id="vramSlider" min="4" max="256" step="1" value="24" aria-labelledby="vramSizeLabel">
						<div class="slider-labels">
							<span style="left: 0%">4GB</span>
							<span style="left: 23.8%">64GB</span>
							<span style="left: 49.2%">128GB</span>
							<span style="left: 100%">256GB</span>
						</div>
					</div>
					
					<div class="form-group">
						<div class="label-row">
							<label id="gpuTypeLabel">GPU Type</label>
						</div>
						<select id="gpuType" class="full-width" aria-labelledby="gpuTypeLabel">
							<option value="discrete">Discrete GPU (NVIDIA/AMD)</option>
							<option value="soc">Apple Silicon (M-series)</option>
							<option value="snapdragon">Snapdragon (Windows on Arm)</option>
						</select>
					</div>

					<div class="form-group">
						<div class="label-row">
							<label id="overheadLabel">System Overhead</label>
							<span class="value" id="overheadValueDisplay">1.5 GB</span>
						</div>
						<input type="range" id="overheadSlider" min="0" max="16" step="0.1" value="1.5" aria-labelledby="overheadLabel">
						<div class="slider-labels">
							<span style="left: 0%">0GB</span>
							<span style="left: 50%">8GB</span>
							<span style="left: 100%">16GB</span>
						</div>
					</div>
				</div>
				
				<div class="card">
					<h2 id="quantizationLabel">Quantization</h2>
					<div class="form-group">
						<div class="label-row">
							<label id="modelQuantLabel">Model Precision</label>
						</div>
						<select id="quantization" class="full-width" aria-labelledby="modelQuantLabel">
							<option value="fp32">FP32 (4.0 bytes)</option>
							<option value="fp16" selected>FP16 (2.0 bytes)</option>
							<option value="bf16">BF16 (2.0 bytes)</option>
							<option value="fp8">FP8 (1.0 byte)</option>
							<option value="int8">INT8 (1.0 byte)</option>
							<option value="int4">INT4 (0.5 bytes)</option>
							<option value="fp4">FP4 (0.5 bytes)</option>
							<option value="fp2">FP2 (0.25 bytes)</option>
						</select>
					</div>

					<div class="form-group">
						<div class="label-row">
							<label id="kvCacheLabel">KV Cache</label>
						</div>
						<select id="kvCache" class="full-width" aria-labelledby="kvCacheLabel">
							<option value="same" selected>Same as Model</option>
							<option value="fp16">FP16 (2.0 bytes)</option>
							<option value="fp8">FP8 (1.0 byte)</option>
							<option value="int8">INT8 (1.0 byte)</option>
							<option value="int4">INT4 (0.5 bytes)</option>
						</select>
					</div>

					<div class="form-group">
						<div class="label-row">
							<label id="attentionLabel">Attention</label>
						</div>
						<select id="attention" class="full-width" aria-labelledby="attentionLabel">
							<option value="mha">MHA (Standard)</option>
							<option value="gqa" selected>GQA (Modern)</option>
						</select>
					</div>
				</div>
				
				<div class="card">
					<h2 id="contextLabel">Context Window</h2>
					<div class="form-group">
						<div class="label-row">
							<label id="maxContextLabel">Max Context</label>
							<span class="value" id="contextValue">8,192 tokens</span>
						</div>
						<input type="range" id="contextSlider" min="9" max="20" step="1" value="13" aria-labelledby="maxContextLabel">
						<div class="slider-labels">
							<span style="left: 0%">512</span>
							<span style="left: 36.4%">8K</span>
							<span style="left: 72.7%">128K</span>
							<span style="left: 100%">1M</span>
						</div>
					</div>
				</div>
			</div>
			
			<!-- Results Column -->
			<div class="results-column">
				<div class="result-card">
					<h3 class="result-category" id="maxParamsLabel">Maximum Parameters</h3>
					<div class="result-value" id="resultValue" aria-live="polite">0B</div>
					<div class="result-category" id="resultCategory"></div>

					<div class="model-details hidden" id="modelDetails">
						<div class="detail-item">
							<span id="layersLabel">Layers</span>
							<span id="layersValue">-</span>
						</div>
						<div class="detail-item">
							<span id="hiddenLabel">Hidden Size</span>
							<span id="hiddenValue">-</span>
						</div>
					</div>
					<button id="copyBtn" class="preset-btn" style="margin-top:1rem;width:100%"></button>
				</div>
				
				<div id="warningBox" class="warning-box hidden"></div>

				<div class="card">
					<h2 id="memoryAllocationLabel">Memory Allocation</h2>
					<div class="memory-bar-container" aria-labelledby="memoryAllocationLabel">
						<div id="barOverhead" class="memory-bar-segment segment-overhead" style="width: 0%" role="img"></div>
						<div id="barKv" class="memory-bar-segment segment-kv" style="width: 0%" role="img"></div>
						<div id="barModel" class="memory-bar-segment segment-model" style="width: 0%" role="img"></div>
					</div>
					<div id="metricsList"></div>
				</div>
				
				<div class="card">
					<h2 id="presetsLabel">Quick Presets</h2>
					<div class="presets-grid">
						<button class="preset-btn" data-preset="rtx5050">RTX 5050</button>
						<button class="preset-btn" data-preset="rtx5090">RTX 5090</button>
						<button class="preset-btn" data-preset="rtx4090">RTX 4090</button>
						<button class="preset-btn" data-preset="a100">A100 80GB</button>
						<button class="preset-btn" data-preset="h200">H200</button>
						<button class="preset-btn" data-preset="m4max">M4 Max</button>
						<button class="preset-btn" data-preset="macbookneo">Macbook neo</button>
						<button class="preset-btn" data-preset="snapdragon">Snapdragon</button>
					</div>
				</div>
			</div>
		</div>
		
		<div class="reference-section">
			<h3 id="referenceTitle">References & Methodology</h3>
			<div class="reference-grid">
				<div id="formulasSection"></div>
				<div id="architectureSection"></div>
			</div>
			<div style="margin-top: 1rem; opacity: 0.8;" id="sourcesText"></div>
		</div>
	</div>
	
	<script>
		const text = {
			en: {
				title: 'LLM VRAM Calculator',
				subtitle: 'Calculate maximum model size that fits in your GPU memory, accounting for quantization, KV cache, and system overhead',
				autoTheme: 'Auto',
				lightTheme: 'Light',
				darkTheme: 'Dark',
				vramLabel: 'GPU Memory',
				vramSizeLabel: 'VRAM Size',
				systemRamLabel: 'Total System RAM',
				gpuTypeLabel: 'GPU Type',
				overheadLabel: 'System Overhead Deduction',
				quantizationLabel: 'Quantization',
				modelQuantLabel: 'Model Precision',
				kvCacheLabel: 'KV Cache',
				attentionLabel: 'Attention Mechanism',
				contextLabel: 'Context Window',
				maxContextLabel: 'Max Context',
				maxParamsLabel: 'Maximum Parameters',
				memoryAllocationLabel: 'Memory Allocation',
				presetsLabel: 'Quick Presets',
				referenceTitle: 'References & Methodology',
				languageLabel: 'Select Language',
				themeLabel: 'Select Theme',
				copyBtn: 'Copy Summary',
				copied: 'Copied!',
				shareUrl: 'Shareable URL',
				
				totalVram: 'Total VRAM',
				systemOverhead: 'System Overhead',
				kvCacheMemory: 'KV Cache',
				modelWeights: 'Model Weights',
				
				layersLabel: 'Layers',
				hiddenLabel: 'Hidden Size',
				
				categorySuffix: '•',
				categoryToy: 'Toy',
				categorySmall: 'Small',
				categoryMedium: 'Medium',
				categoryLarge: 'Large',
				categoryVeryLarge: 'Very Large',
				categoryMassive: 'Massive',
				estimatedArchitecture: 'Estimated Architecture',
				reserved: 'Reserved',
				mbPerToken: 'MB/token',
				
				warningKvCache: '⚠️ KV cache >50% of VRAM. Reduce context.',
				warningInsufficient: '❌ Insufficient VRAM for model.',
				insufficient: 'INSUFFICIENT',
				
				formulas: '<strong>Formulas:</strong><br>• Model: params × bytes/param<br>• KV Cache: 2 × layers × hidden × context × bytes<br>• Overhead: Fixed amount (OS, Display, Framework)',
				architecture: '<strong>Reference Data:</strong><br>• Llama 3/3.1: 8B=32L×4096d, 70B=80L×8192d<br>• Mistral 7B: 32L×4096d, GQA(32q/8kv heads)<br>• Gemma 2: 9B=42L×3584d, 27B=46L×4608d<br>• Qwen 2.5: 7B=28L×3584d, 72B=80L×8192d',
				sources: '<strong>Sources:</strong> Meta Llama Technical Reports (2024-2025), Mistral AI Docs & Papers (2023-2024), Google Gemma Blog & HF Docs (2024), Qwen 2.5 Technical Report (2024), HuggingFace Model Cards, NVIDIA Technical Blogs, vLLM Documentation'
			},
			id: {
				title: 'Kalkulator VRAM LLM',
